<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Situnu Gumansingn</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
text-align:center;
padding:40px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.05);
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
max-width:500px;
}

h1{
font-size:40px;
letter-spacing:2px;
margin-bottom:25px;
}

.profile{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
transition:0.4s;
}

.profile:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>Situnu Gumansingh</h1>

<img src="situnu.jpeg" class="profile">

</div>

</body>
</html>
